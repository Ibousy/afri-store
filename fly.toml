# Fly.io configuration — Afri-Store PHP App
app = "afri-store-ibousy"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  SITE_NAME = "Afri-Store"
  MYSQLPORT  = "3306"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
